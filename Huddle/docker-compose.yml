      #context: ./app2/backend2
      #dockerfile: Dockerfile
    #container_name: auth-backend2
    #env_file:
      #- .env
    #ports:
      #- "8003:8003"
    #depends_on:
      #postgres-db:
       # condition: service_healthy
    #command: >
      #sh -c "
      #python manage.py migrate &&
      #python manage.py runserver 0.0.0.0:8003
     # "

  # ----------------------------------------------------
  # APP1 (REACT HUDDLE APPLICATION 1)
  # ----------------------------------------------------
  app1:
    build:
      context: ./app1/frontend1
      dockerfile: Dockerfile
    container_name: react-app1
    ports:
      - "3000:3000"
    depends_on:
      - backend1
      - microservice

 